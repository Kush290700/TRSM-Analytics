<form class="row gy-2 gx-2 align-items-end mb-3" method="get">
  <div class="col-auto">
    <label class="form-label">Start</label>
    <input class="form-control form-control-sm" type="date" name="start" value="{{ request.args.get('start','') }}">
  </div>
  <div class="col-auto">
    <label class="form-label">End</label>
    <input class="form-control form-control-sm" type="date" name="end" value="{{ request.args.get('end','') }}">
  </div>
  <div class="col-auto">
    <label class="form-label">Protein min</label>
    <input class="form-control form-control-sm" type="number" step="0.01" name="protein_min" value="{{ request.args.get('protein_min','') }}">
  </div>
  <div class="col-auto">
    <label class="form-label">Protein max</label>
    <input class="form-control form-control-sm" type="number" step="0.01" name="protein_max" value="{{ request.args.get('protein_max','') }}">
  </div>
  <div class="col-auto">
    <label class="form-label">Protein name (like)</label>
    <input class="form-control form-control-sm" type="text" name="protein_name" value="{{ request.args.get('protein_name','') }}" placeholder="chicken, beef...">
  </div>
  <div class="col-auto">
    <button class="btn btn-sm btn-primary">Apply</button>
  </div>
</form>
