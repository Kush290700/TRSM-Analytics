{% extends 'base.html' %}
{% block content %}
<div class="row mb-3">
  <div class="col-12 d-flex justify-content-between align-items-center">
    <h2 class="mb-0">Feature Flags</h2>
    <a class="btn btn-outline-secondary btn-sm" href="/admin/users">Back</a>
  </div>
</div>

<div class="row">
  <div class="col-md-6">
    <div class="card"><div class="card-body">
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="form-check form-switch mb-2">
          <input class="form-check-input" type="checkbox" id="f_churn" name="enable_churn" {% if flags.enable_churn %}checked{% endif %}>
          <label class="form-check-label" for="f_churn">Enable Churn Model</label>
        </div>
        <div class="form-check form-switch mb-2">
          <input class="form-check-input" type="checkbox" id="f_prophet" name="enable_prophet" {% if flags.enable_prophet %}checked{% endif %}>
          <label class="form-check-label" for="f_prophet">Enable Forecast (Prophet or fallback)</label>
        </div>
        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" id="f_2fa" name="enable_2fa" {% if flags.enable_2fa %}checked{% endif %}>
          <label class="form-check-label" for="f_2fa">Enable Two-Factor Auth (2FA)</label>
        </div>
        <button class="btn btn-primary" type="submit">Save</button>
      </form>
    </div></div>
  </div>
</div>
{% endblock %}
