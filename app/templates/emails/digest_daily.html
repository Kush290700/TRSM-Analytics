<!doctype html>
<html lang="en">
  <body style="margin:0;padding:24px;background:#f8fafc;font-family:Segoe UI,Arial,sans-serif;color:#0f172a;">
    <div style="max-width:720px;margin:0 auto;background:#ffffff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;">
      <div style="background:#0f2742;color:#f8fafc;padding:20px 24px;">
        <div style="font-size:12px;letter-spacing:.08em;text-transform:uppercase;opacity:.82;">TRSM Analytics</div>
        <h1 style="margin:8px 0 0;font-size:22px;line-height:1.3;">{{ digest_label }}</h1>
      </div>
      <div style="padding:24px;">
        <p style="margin:0 0 18px;">Hello {{ recipient_name or "there" }},</p>
        <table style="width:100%;border-collapse:collapse;margin:0 0 20px;">
          <thead>
            <tr>
              <th align="left" style="padding:10px 12px;border:1px solid #e2e8f0;background:#f8fafc;">Alert</th>
              <th align="left" style="padding:10px 12px;border:1px solid #e2e8f0;background:#f8fafc;">Summary</th>
            </tr>
          </thead>
          <tbody>
            {% for item in items %}
            <tr>
              <td style="padding:10px 12px;border:1px solid #e2e8f0;font-weight:600;">{{ item.alert_name }}</td>
              <td style="padding:10px 12px;border:1px solid #e2e8f0;">
                <div>{{ item.summary }}</div>
                <div style="margin-top:6px;font-size:12px;"><a href="{{ item.details_url }}">Open related page</a></div>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
        <p style="margin:0;color:#475569;font-size:13px;">Manage alerts: <a href="{{ manage_url }}">{{ manage_url }}</a></p>
      </div>
    </div>
  </body>
</html>
